name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update manifest version
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          jq --arg v "$version" '.version = $v' custom_components/the_bird/manifest.json > tmp.json
          mv tmp.json custom_components/the_bird/manifest.json

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/the_bird/manifest.json
          git commit -m "Bump version to ${{ github.event.release.tag_name }}"
          git push origin HEAD:main
